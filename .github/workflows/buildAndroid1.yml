name: 构建Android

on:
  push:
    branches: [ 'main' ]
    paths: [ 'version.txt' ]
  workflow_dispatch:

env:
  APP_NAME: taoSync
  BUILDOZER_SPEC: buildozer.spec

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - id: getVersion
        name: 获取版本号
        run: |
          versions=$(head -n 1 version.txt)
          IFS=',' read -ra versionList <<< "$versions"
          cuVersion="${versionList[0]}"
          echo "VERSION=$cuVersion" >> "$GITHUB_OUTPUT"

  build-android:
    name: 构建android
    runs-on: ubuntu-latest
    needs: [ get-version ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    # 仅在非 dev 版本构建 apk
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev libsqlite3-dev libbz2-dev libreadline-dev \
            libportaudio2 libportaudiocpp0 \
            ccache git wget unzip zip \
            openjdk-17-jdk build-essential
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 配置Java环境变量
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: 安装 Buildozer 与 python-for-android
        run: |
          python -m pip install --upgrade pip
          python -m pip install "buildozer==1.5.0" "python-for-android==2024.01.21" "Cython==0.29.37" virtualenv==20.25.0

      - name: 缓存 Buildozer 全局目录
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            /opt/android-sdk
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: |
            buildozer-v2-${{ runner.os }}-

      - name: 检查 buildozer.spec 是否存在，不存在则创建默认配置
        id: checkSpec
        run: |
          if [ ! -f "$BUILDOZER_SPEC" ]; then
            echo "::warning::未找到 $BUILDOZER_SPEC，自动创建默认配置"
            cat > "$BUILDOZER_SPEC" << 'EOF'
[app]
title = taoSync
package.name = taosync
package.domain = org.taofang
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 0.1
requirements = python3==3.11.9,kivy==2.3.0,sdl2,tornado,requests,APScheduler,configparser,pathspec
orientation = portrait
fullscreen = 0
android.api = 33
android.ndk = 25b
android.sdk = 24
android.archs = arm64-v8a, armeabi-v7a
android.permissions = INTERNET,ACCESS_NETWORK_STATE
android.logcat_filters = *:S python:D
android.allow_backup = True
[buildozer]
log_level = 2
warn_on_root = 1
EOF
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 注入版本号到 buildozer.spec
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          sed -i "s/^version = .*/version = $VERSION/" "$BUILDOZER_SPEC"
          grep -E "^version" "$BUILDOZER_SPEC" || true

      - name: 强制设置稳定依赖版本
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          if grep -q "^requirements" "$BUILDOZER_SPEC"; then
            existing_reqs=$(grep "^requirements" "$BUILDOZER_SPEC" | head -n 1 | sed 's/requirements = //')
            echo "原始 requirements: $existing_reqs"
            new_reqs=$(echo "$existing_reqs" | sed -E 's/(^|,)python3(==[^,]*)?/\1python3==3.11.9/g')
            if [[ "$new_reqs" != *"python3==3.11.9"* ]]; then
              new_reqs="python3==3.11.9,$new_reqs"
            fi
            new_reqs=$(echo "$new_reqs" | sed -E 's/(^|,)kivy(==[^,]*)?/\1kivy==2.3.0/g')
            if [[ "$new_reqs" != *"kivy=="* ]]; then
              new_reqs="$new_reqs,kivy==2.3.0"
            fi
            if [[ "$new_reqs" != *",sdl2"* ]] && [[ "$new_reqs" != "sdl2"* ]] && [[ "$new_reqs" != *",sdl2,"* ]]; then
              new_reqs="$new_reqs,sdl2"
            fi
            new_reqs=$(echo "$new_reqs" | sed 's/^,//' | sed 's/,,*/,/g')
            sed -i "s/^requirements = .*/requirements = $new_reqs/" "$BUILDOZER_SPEC"
          else
            echo "requirements = python3==3.11.9,kivy==2.3.0,sdl2" >> "$BUILDOZER_SPEC"
          fi
          if ! grep -q "^android.api" "$BUILDOZER_SPEC"; then
            echo "android.api = 33" >> "$BUILDOZER_SPEC"
          else
            sed -i "s/^android.api = .*/android.api = 33/" "$BUILDOZER_SPEC"
          fi
          if ! grep -q "^android.ndk" "$BUILDOZER_SPEC"; then
            echo "android.ndk = 25b" >> "$BUILDOZER_SPEC"
          else
            sed -i "s/^android.ndk = .*/android.ndk = 25b/" "$BUILDOZER_SPEC"
          fi
          if ! grep -q "^android.sdk" "$BUILDOZER_SPEC"; then
            echo "android.sdk = 24" >> "$BUILDOZER_SPEC"
          else
            sed -i "s/^android.sdk = .*/android.sdk = 24/" "$BUILDOZER_SPEC"
          fi
          if ! grep -q "^android.archs" "$BUILDOZER_SPEC"; then
            echo "android.archs = arm64-v8a, armeabi-v7a" >> "$BUILDOZER_SPEC"
          fi
          echo "=== 配置检查 ==="
          grep -E "^(requirements|android\.(api|ndk|sdk|archs))" "$BUILDOZER_SPEC" || true

      - name: 清理并编译 Android Debug APK
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          buildozer android clean
          buildozer android debug

      - name: 重命名 APK
        if: steps.checkSpec.outputs.exists == 'true'
        run: |
          mkdir -p dist
          apk_path=$(ls bin/*.apk 2>/dev/null | head -n 1)
          if [ -n "$apk_path" ]; then
            cp "$apk_path" "dist/${APP_NAME}-${VERSION}-android-debug.apk"
          else
            echo "::error::未找到编译产物 APK"
            exit 1
          fi

      - name: 上传artifact
        if: steps.checkSpec.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist-android
          path: dist/*.apk
          retention-days: 7

  upload-release:
    name: 上传到release
    runs-on: ubuntu-latest
    needs: [ get-version, build-android ]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    if: ${{ !contains(needs.get-version.outputs.VERSION, 'dev') }}

    steps:
      - name: 下载构建结果
        uses: actions/download-artifact@v4
        with:
          name: dist-android
          path: dist

      - name: 上传到release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/*.apk
