name: buildNuitka

on:
  workflow_dispatch:

env:
  APP_NAME: taoSync

jobs:
  get-version:
    name: 获取版本号
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.getVersion.outputs.VERSION }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
      - id: getVersion
        run: |
          versions=$(head -n 1 version.txt)
          IFS=',' read -ra versionList <<< "$versions"
          echo "VERSION=${versionList[0]}" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    needs: [ get-version ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "14.x"
      - run: |
          sed -i "s/__version_placeholder__/${{ needs.get-version.outputs.VERSION }}/g" frontend/src/views/page/setting/index.vue
          cd frontend && npm install && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-android:
    name: 构建Android PIE (Nuitka + Termux)
    runs-on: ubuntu-latest
    needs: [ get-version, build-frontend ]
    strategy:
      fail-fast: false
      matrix:
        include:
          # 主流 Android 设备: 64 位 ARM
          - platform: aarch64
            docker_platform: linux/arm64
          # 老旧 Android 设备: 32 位 ARM
          - platform: arm
            docker_platform: linux/arm/v7
          # Android 模拟器 / Chromebook: 64 位 x86
          - platform: x86_64
            docker_platform: linux/amd64
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: 开放工作目录权限 (供 termux system 用户读写)
        run: chmod -R 777 .

      - name: 在 Termux 中用 Nuitka 编译 Android PIE
        # 注意: 不要覆盖 entrypoint! termux-docker 的 /entrypoint.sh 负责设置
        # PREFIX / PATH / HOME / LD_LIBRARY_PATH 并降权到 system 用户.
        # 覆盖成 /bin/bash 会因为该路径在 termux 镜像里不存在而报错.
        # 命令作为 args 传入, entrypoint 完成 env 设置后会 exec 它.
        #
        # 重要: entrypoint.sh 切换 system 用户时用了 `su -i`, 会清空环境变量
        # 只保留白名单 (ANDROID_DATA/HOME/LANG/PATH/PREFIX/TMPDIR/TZ/TERM).
        # 所以 docker -e 传进去的变量会丢! 必须用 ${{ env.XXX }} 让 GitHub Actions
        # 在 workflow 求值阶段直接做文本替换, 不能依赖容器内 env.
        run: |
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            --init \
            --security-opt seccomp=unconfined \
            -v "$(pwd):/app" \
            -w /app \
            termux/termux-docker:${{ matrix.platform }} \
            bash -c '
              set -e

              # 用 GitHub Actions 表达式注入 (绕过 entrypoint 的 env 清空)
              APP_NAME="${{ env.APP_NAME }}"
              PLATFORM="${{ matrix.platform }}"
              export APP_NAME PLATFORM

              # entrypoint 已设置好 termux 环境 (PREFIX/PATH/HOME/LD_LIBRARY_PATH)
              echo "===== 基础环境 ====="
              echo "whoami=$(whoami)"
              echo "PREFIX=$PREFIX"
              echo "HOME=$HOME"
              echo "PATH=$PATH"
              echo "APP_NAME=$APP_NAME"
              echo "PLATFORM=$PLATFORM"
              echo "=================="

              # ===== 安装编译工具链与 Python =====
              # termux-docker 镜像默认不带 python/clang, 必须先装!
              # Nuitka 官方要求 termux 安装: patchelf ccache binutils ldd termux-elf-cleaner
              # clang 是 Nuitka 的 C 编译器, make 是构建工具
              pkg update -y
              pkg install -y python clang make patchelf ccache binutils ldd termux-elf-cleaner

              # ===== 安装后校验工具链 =====
              echo "===== 工具链版本 ====="
              python --version
              clang --version | head -n 1
              echo "======================"

              # ===== 安装 Nuitka 及打包辅助依赖 =====
              # termux 禁止 upgrade pip (会破坏 python-pip 包), 直接用自带 pip
              # termux 的 python 包已内置 pip, 无需升级
              python -m pip install nuitka ordered-set zstandard

              # ===== 安装项目依赖 =====
              if [ -f requirements.txt ]; then
                python -m pip install -r requirements.txt
              fi

              # ===== Nuitka 版本 =====
              python -m nuitka --version

              # ===== 校验入口文件存在 =====
              # 实际入口是 main.py, APP_NAME (taoSync) 只用作产物名
              ENTRY_FILE="main.py"
              if [ ! -f "$ENTRY_FILE" ]; then
                echo "FATAL: 入口文件 $ENTRY_FILE 不存在! 当前目录:"
                ls -la
                exit 1
              fi

              # ===== 清理旧产物 =====
              rm -rf "/app/build/$PLATFORM" "/app/dist/$PLATFORM"
              mkdir -p "/app/dist/$PLATFORM"

              # ===== 复制入口文件为 APP_NAME.py, 让 Nuitka 产物名带 APP_NAME =====
              # Nuitka 默认按入口文件名命名产物 (xxx.dist/xxx), 复制一份最简单
              cp -f "$ENTRY_FILE" "$APP_NAME.py"
              trap "rm -f \"$APP_NAME.py\"" EXIT

              # ===== 使用 Nuitka 编译为 Android PIE 可执行文件 =====
              # Termux 的 clang 默认输出 PIE (-fPIE -pie), 满足 Android 5.0+ 强制要求
              # --standalone      : 生成独立分发包 (目录形式, 含所有依赖)
              # --follow-imports  : 自动跟踪所有 import, 等价于 PyInstaller 的 hiddenimports
              # --include-data-dir: 把前端 dist 打进产物, 对应 spec 中的 datas
              python -m nuitka \
                --standalone \
                --follow-imports \
                --remove-output \
                --assume-yes-for-downloads \
                --output-dir="/app/build/$PLATFORM" \
                --include-data-dir=frontend/dist=frontend/dist \
                "$APP_NAME.py"

              # ===== 移动 .dist 目录到 dist =====
              mv "/app/build/$PLATFORM/${APP_NAME}.dist" \
                 "/app/dist/$PLATFORM/${APP_NAME}.dist"

              # Nuitka 在 termux/android 上产物名带 .bin 后缀 (taoSync.bin)
              # 重命名为不带后缀, 方便用户在 termux 里直接 ./taoSync 运行
              BIN_NAME="${APP_NAME}.bin"
              if [ -f "/app/dist/$PLATFORM/${APP_NAME}.dist/$BIN_NAME" ]; then
                mv "/app/dist/$PLATFORM/${APP_NAME}.dist/$BIN_NAME" \
                   "/app/dist/$PLATFORM/${APP_NAME}.dist/$APP_NAME"
              fi
              chmod +x "/app/dist/$PLATFORM/${APP_NAME}.dist/$APP_NAME"

              # ===== 开放产物权限, 让宿主 runner 用户(1001)可读可写 =====
              # 不能 chown, system 用户没权限; chmod 自己的文件没问题
              chmod -R a+rwX /app/dist /app/build
            '

      - name: 压缩产物 (Zip)
        run: |
          cd dist/${{ matrix.platform }}
          zip -r "../../${{ env.APP_NAME }}-android-Nuitka-${{ matrix.platform }}.zip" .

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-Nuitka-${{ matrix.platform }}
          path: ${{ env.APP_NAME }}-android-Nuitka-${{ matrix.platform }}.zip
          retention-days: 90
